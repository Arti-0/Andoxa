<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: #FAFAFA;
    color: var(--foreground);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  svg { display: block; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; background-clip: padding-box; border: 2px solid transparent; }

  /* Slide-in panel animation */
  @keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0.4; }
    to { transform: translateX(0); opacity: 1; }
  }
  .panel-slide-in {
    animation: slideInRight 220ms cubic-bezier(0.32, 0.72, 0, 1);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .fade-in { animation: fadeIn 180ms ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="_andoxa-sidebar.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="BookingLink.jsx"></script>
<script type="text/babel" src="KpiCards.jsx"></script>
<script type="text/babel" src="CalendarGrid.jsx"></script>
<script type="text/babel" src="EventPanel.jsx"></script>
<script type="text/babel" src="CreateEventModal.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>
