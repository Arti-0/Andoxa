<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Templates de messages — Andoxa</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-sans); background: #F7F8FA; color: var(--slate-800); -webkit-font-smoothing: antialiased; }
  svg { display: block; }
  button, input, textarea, select { font-family: inherit; }

  :root {
    --slate-50:  #F8FAFC;
    --slate-100: #F1F5F9;
    --slate-150: #E8EDF3;
    --slate-200: #E2E8F0;
    --slate-300: #CBD5E1;
    --slate-500: #64748B;
    --slate-600: #475569;
    --slate-700: #334155;
    --slate-900: #0F172A;
    --andoxa-blue: #0052D9;
    --andoxa-blue-light: #1A6AFF;
    --andoxa-blue-50: #EEF4FE;
    --andoxa-blue-100: #DBE7FC;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--slate-200); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--slate-300); }
  ::-webkit-scrollbar-track { background: transparent; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 13px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    border: 1px solid var(--slate-200); background: white;
    cursor: pointer; color: var(--slate-700);
    transition: all 140ms ease; white-space: nowrap;
  }
  .btn:hover { background: var(--slate-50); border-color: var(--slate-300); color: var(--slate-900); }
  .btn-primary {
    background: var(--andoxa-blue); color: white; border-color: var(--andoxa-blue);
    box-shadow: 0 1px 2px rgba(0,82,217,0.18);
  }
  .btn-primary:hover { background: var(--andoxa-blue-light); border-color: var(--andoxa-blue-light); color: white; }
  .btn-ghost { border-color: transparent; background: transparent; color: var(--slate-600); }
  .btn-ghost:hover { background: var(--slate-100); border-color: transparent; color: var(--slate-900); }
  .btn-danger-ghost { border-color: transparent; background: transparent; color: #B91C1C; }
  .btn-danger-ghost:hover { background: #FEF2F2; }

  .icon-btn {
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 7px; border: 0; background: transparent; cursor: pointer; color: var(--slate-500);
    transition: background 120ms, color 120ms;
  }
  .icon-btn:hover { background: var(--slate-100); color: var(--slate-900); }
  .icon-btn.danger:hover { background: #FEF2F2; color: #B91C1C; }

  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 999px; line-height: 1.4; white-space: nowrap;
  }
  .var-pill {
    display: inline-flex; align-items: center;
    font-size: 10.5px; font-weight: 500; font-family: var(--font-mono);
    padding: 1px 6px; border-radius: 4px;
    background: var(--slate-100); color: var(--slate-700);
  }

  .input-shell {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; background: white;
    border: 1px solid var(--slate-200); border-radius: 8px;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .input-shell:focus-within {
    border-color: var(--andoxa-blue);
    box-shadow: 0 0 0 3px rgba(0,82,217,0.12);
  }
  .input-shell input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-size: 13px; color: var(--slate-900);
  }
  .input-shell input::placeholder { color: var(--slate-500); }

  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--slate-200); background: white;
    font-size: 13px; color: var(--slate-900); outline: 0;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--andoxa-blue);
    box-shadow: 0 0 0 3px rgba(0,82,217,0.12);
  }
  .form-textarea { resize: vertical; line-height: 1.6; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--slate-700); margin-bottom: 6px; display:block; }

  .seg { display: inline-flex; align-items: center; gap: 2px; padding: 2px; background: var(--slate-100); border-radius: 8px; }
  .seg button {
    font-size: 12px; font-weight: 500;
    padding: 6px 11px; border-radius: 6px;
    border: 0; background: transparent; cursor: pointer; color: var(--slate-500);
    display: inline-flex; align-items: center; gap: 5px; transition: all 120ms;
  }
  .seg button:hover { color: var(--slate-900); }
  .seg button.active { background: white; color: var(--slate-900); box-shadow: 0 1px 2px rgba(15,23,42,0.06); }

  .filter-chip {
    font-size: 12px; font-weight: 500;
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid transparent; background: transparent;
    color: var(--slate-500); cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 120ms; white-space: nowrap;
  }
  .filter-chip:hover { background: var(--slate-100); color: var(--slate-900); }
  .filter-chip.active { background: var(--andoxa-blue); color: white; }

  .cat-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; margin: 1px 6px;
    border-radius: 7px; font-size: 13px; color: var(--slate-700);
    cursor: pointer; user-select: none;
    border-left: 3px solid transparent;
    transition: background 120ms;
  }
  .cat-item:hover { background: var(--slate-100); }
  .cat-item.active {
    background: var(--andoxa-blue-50); color: var(--andoxa-blue);
    border-left-color: var(--andoxa-blue);
    font-weight: 500;
  }
  .cat-item .cat-count {
    margin-left: auto; font-size: 11px; color: var(--slate-500);
  }
  .cat-item.active .cat-count { color: var(--andoxa-blue); }

  .tpl-card {
    background: white; border: 1px solid var(--slate-200); border-radius: 10px;
    padding: 16px; cursor: pointer;
    transition: box-shadow 140ms, border-color 140ms;
  }
  .tpl-card:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.06); border-color: var(--slate-300); }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(15,23,42,0.45);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
    animation: fade-in 160ms ease;
  }
  @keyframes fade-in { from {opacity:0} to {opacity:1} }
  .modal {
    background: white; border-radius: 14px;
    width: 100%; max-height: 90vh; display: flex; flex-direction: column;
    box-shadow: 0 24px 60px rgba(15,23,42,0.25);
    animation: pop 180ms ease;
  }
  @keyframes pop { from {transform: translateY(8px) scale(0.99); opacity: 0} to {transform: none; opacity: 1} }

  .var-toolbar-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    padding: 4px 9px; border-radius: 6px;
    background: var(--slate-100); color: var(--slate-700);
    border: 1px solid var(--slate-200); cursor: pointer;
    transition: all 120ms;
  }
  .var-toolbar-btn:hover { background: var(--andoxa-blue-50); color: var(--andoxa-blue); border-color: var(--andoxa-blue-100); }

  .preview-block {
    background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 10px;
    padding: 14px; font-size: 13px; line-height: 1.6; color: var(--slate-800);
    white-space: pre-wrap;
  }
  .var-highlight {
    background: #FEF3C7; color: #92400E;
    padding: 0 3px; border-radius: 3px; font-weight: 500;
  }
  .var-resolved { font-weight: 500; color: var(--andoxa-blue); }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; margin: 1px 6px;
    border-radius: 7px; font-size: 13px; color: var(--slate-700);
    cursor: pointer; transition: background 120ms; user-select: none;
  }
  .nav-item:hover { background: var(--slate-100); }
  .nav-item.active { background: var(--andoxa-blue); color: white; font-weight: 500; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="_andoxa-sidebar.jsx"></script>
<script type="text/babel" src="src/templates.jsx"></script>
</body>
</html>
