<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Tableau de bord — Andoxa</title>
  <link rel="stylesheet" href="andoxa.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: 'Geist', system-ui, sans-serif; background: #FAFAFA; color: var(--foreground); }
    * { box-sizing: border-box; }
    .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 999px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    /* tailwind escape for slate via arbitrary values is fine */
    .ring-andoxa:focus { outline: 2px solid #0052D9; outline-offset: 2px; }
    @keyframes pulseDot { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
    .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="_andoxa-sidebar.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
